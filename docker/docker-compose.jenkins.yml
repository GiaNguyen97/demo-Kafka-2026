version: '3.8'

services:
  jenkins:
    build: 
      context: ./jenkins
      dockerfile: Dockerfile
    container_name: jenkins-server
    privileged: true
    user: root # Setup root override để tránh phân quyền socket phức tạp ở local Docker Desktop
    ports:
      - "9095:8080" # Giao diện Web Jenkins (Đổi sang 9095 để tránh đụng Jenkins service)
      - "50000:50000" # JNLP port cho Agent nội bộ
    volumes:
      - jenkins_home:/var/jenkins_home
      - /var/run/docker.sock:/var/run/docker.sock # Chìa khóa vàng DooD
    restart: on-failure

volumes:
  jenkins_home:
    name: jenkins_dood_data
